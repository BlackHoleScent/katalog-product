<!DOCTYPE html>
<html>
<head>
    <title>Katalog Produk</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .produk-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .kartu-produk { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 250px; }
        .kartu-produk img { max-width: 100%; border-radius: 5px; }
        .harga { color: #d9534f; font-size: 20px; font-weight: bold; }
        .tombol-beli { display: inline-block; background: #25D366; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Katalog Produk Kami</h1>
    
    <div class="produk-grid">
        <!-- Produk 1 -->
        <div class="kartu-produk">
            <img src="https://via.placeholder.com/200" alt="Foto Produk">
            <h3>Nama Produk A</h3>
            <p class="harga">Rp 50.000</p>
            <a href="https://wa.me/6281234567890" class="tombol-beli">Beli via WA</a>
        </div>
        
        <!-- Produk 2 -->
        <div class="kartu-produk">
            <img src="https://via.placeholder.com/200" alt="Foto Produk">
            <h3>Nama Produk B</h3>
            <p class="harga">Rp 75.000</p>
            <a href="https://wa.me/6281234567890" class="tombol-beli">Beli via WA</a>
        </div>
    </div>
</body>
</html>
